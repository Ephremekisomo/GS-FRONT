<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a2e">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%231a1a2e'/%3E%3Cstop offset='100%25' stop-color='%233498db'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M50 5 L90 20 L90 55 Q90 80 50 95 Q10 80 10 55 L10 20 Z' fill='url(%23g)'/%3E%3Ctext x='50' y='60' text-anchor='middle' fill='white' font-family='Arial,sans-serif' font-size='32' font-weight='bold'%3EGS%3C/text%3E%3C/svg%3E">
    <title>Goma Security - Poste de Securite</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="poste.css">
</head>
<body>
    <div id="app">
        <!-- Dashboard -->
        <section id="dashboard-section" class="active">
            <!-- Header -->
            <header class="app-header">
                <div class="header-content">
                    <div class="logo-small">
                        <i class="fas fa-user-shield"></i>
                        <span id="poste-name">Poste</span>
                    </div>
                    <div class="header-stats">
                        <div class="stat-badge pending">
                            <span id="stat-pending">0</span>
                            <small>En attente</small>
                        </div>
                        <div class="stat-badge in-progress">
                            <span id="stat-progress">0</span>
                            <small>En cours</small>
                        </div>
                        <div class="stat-badge resolved">
                            <span id="stat-resolved">0</span>
                            <small>Resolu</small>
                        </div>
                    </div>
                    <div class="user-menu">
                        <button id="btn-sound-toggle" class="icon-btn" title="Activer/Desactiver le son">
                            <i class="fas fa-volume-up"></i>
                        </button>
                        <button id="btn-call-reinforcement" class="btn-reinforcement" title="Appeler des renforts">
                            <i class="fas fa-bullhorn"></i> Renfort
                        </button>
                        <button id="btn-logout" class="icon-btn">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </div>
                </div>
            </header>

            <!-- Main Content -->
            <div class="main-content">
                <!-- Alerts List -->
                <div class="alerts-container">
                    <h2><i class="fas fa-bell"></i> Alertes attribuees a ce poste</h2>
                    <div id="alerts-list" class="alerts-list"></div>
                </div>

                <!-- Alert Details Panel -->
                <div id="alert-details" class="details-panel hidden">
                    <div class="details-header">
                        <h3>Details de l'alerte</h3>
                        <button id="close-details" class="close-btn">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <div class="details-body">
                        <div class="detail-row">
                            <span class="label">Type:</span>
                            <span id="detail-type" class="value"></span>
                        </div>
                        <div class="detail-row">
                            <span class="label">Statut:</span>
                            <span id="detail-status" class="value"></span>
                        </div>
                        <div class="detail-row">
                            <span class="label">Citoyen:</span>
                            <span id="detail-user" class="value"></span>
                        </div>
                        <div class="detail-row">
                            <span class="label">Telephone:</span>
                            <span id="detail-telephone" class="value"></span>
                        </div>
                        <div class="detail-row">
                            <span class="label">Description:</span>
                            <span id="detail-description" class="value"></span>
                        </div>
                        <div class="detail-row">
                            <span class="label">Localisation:</span>
                            <span id="detail-location" class="value"></span>
                        </div>
                        <div class="detail-row">
                            <span class="label">Cree le:</span>
                            <span id="detail-created" class="value"></span>
                        </div>
                        
                        <!-- Track Location Button -->
                        <div class="track-section">
                            <button id="btn-track" class="btn-track">
                                <i class="fas fa-map-marker-alt"></i> Suivre sur Google Maps
                            </button>
                        </div>
                        
                        <!-- Status Actions -->
                        <div class="status-actions">
                            <h4>Changer le statut</h4>
                            <div class="action-buttons">
                                <button class="btn-status pending" data-status="active">
                                    <i class="fas fa-clock"></i> En attente
                                </button>
                                <button class="btn-status in_progress" data-status="en_cours">
                                    <i class="fas fa-spinner"></i> En cours
                                </button>
                                <button class="btn-status resolved" data-status="resolu">
                                    <i class="fas fa-check-circle"></i> Resolu
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Toast -->
        <div id="toast" class="toast hidden"></div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="poste.js"></script>
</body>
</html>
